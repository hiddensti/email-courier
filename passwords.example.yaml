# Email Courier — IMAP credentials
# Copy this file as passwords.yaml and fill in your app passwords
# ⚠️  passwords.yaml is in .gitignore — it will NOT be committed

mailboxes:
  - name: "My Gmail"            # Must match name in config.yaml
    server: "imap.gmail.com"
    port: 993
    email: "you@gmail.com"
    password: "xxxx xxxx xxxx xxxx"   # Gmail app password (16 chars)

  - name: "My Yahoo"
    server: "imap.mail.yahoo.com"
    port: 993
    email: "you@yahoo.com"
    password: "xxxxxxxxxxxxxxxx"      # Yahoo app password

  # Add more as needed — one entry per mailbox in config.yaml
